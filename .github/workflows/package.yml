name: Cross-platform Release

run-name: Release ${{ github.ref_name }}

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.artifact_suffix }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_suffix: linux-amd64
            binary_name: codex-gateway
          - goos: darwin
            goarch: arm64
            artifact_suffix: macos-arm64
            binary_name: codex-gateway
          - goos: windows
            goarch: amd64
            artifact_suffix: windows-amd64
            binary_name: codex-gateway.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=nightly-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist package
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags "-s -w" -o "package/${{ matrix.binary_name }}" ./cmd/codex-gateway
          cp README.md config.example.yaml package/

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE="codex-gateway-${VERSION}-${{ matrix.artifact_suffix }}.tar.gz"
          tar -czf "dist/${ARCHIVE}" -C package .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-gateway-${{ steps.version.outputs.VERSION }}-${{ matrix.artifact_suffix }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: codex-gateway-*
          path: release_assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: codex-gateway ${{ github.ref_name }}
          files: release_assets/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
