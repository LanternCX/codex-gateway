name: CI

on:
  push:
    branches:
      - main
      - dev
      - "feat/**"
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test ./...

      - name: Run race tests
        run: go test -race ./...
